# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/00-Default.conf

font_family Nerd Font Mono
font_size 12.0
#bold_font auto
#italic_font auto
#bold_italic_font auto

background_opacity 0.5
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 6
window_margin_width 10
single_window_margin_width 0

tab_powerline_style slanted
# selection_foreground none
# selection_background none
# foreground #dddddd
# background #000000
# cursor #dddddd

include ./one-dark-pro-theme/themes/OneDark-Pro-darker.conf


# BEGIN_KITTY_THEME
# OneDark-Pro
include current-theme.conf
# END_KITTY_THEME
